# Server Configuration
server.port=8081
server.servlet.context-path=/api

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/civic_connect
spring.datasource.username=postgres
spring.datasource.password=thanuja
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP Connection Pool ─────────────────────────────────────────────────
# Prevent "Connection is not available, request timed out" errors
spring.datasource.hikari.pool-name=CivicConnectPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# Logging
logging.level.root=INFO
logging.level.com.civicconnect=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Name
spring.application.name=CivicConnect Eco API

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-environment-12345678901234567890
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:8080,http://localhost:8082
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ─── Spring Mail (Gmail SMTP) ─────────────────────────────────────────────────
# Set your Gmail credentials below to enable real email sending.
# Leave spring.mail.username blank to use console-log fallback (dev mode).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── NGO Module ───────────────────────────────────────────────────────────────
# GPS attendance verification radius in metres
ngo.attendance.radius-meters=100
# Complaint count threshold before NGO hotspot alert fires
ngo.hotspot.threshold=10

