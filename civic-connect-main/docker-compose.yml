version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: civic-connect-db
    environment:
      POSTGRES_DB: civic_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civic-connect-network

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: civic-connect-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/civic_connect
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - civic-connect-network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: civic-connect-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8081/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - civic-connect-network

volumes:
  postgres_data:

networks:
  civic-connect-network:
    driver: bridge
